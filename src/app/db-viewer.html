<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwoBeOne - Database Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
      <h1 class="text-3xl font-bold mb-2 text-purple-600">🔍 TwoBeOne Database Viewer</h1>
      <p class="text-gray-600 mb-4">View all data in the key-value store</p>
      
      <div class="flex gap-4 mb-6">
        <button onclick="loadAllUsers()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
          Load All Users
        </button>
        <button onclick="loadAllInviteCodes()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          Load Invite Codes
        </button>
        <button onclick="loadAllJournals()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
          Load Journals
        </button>
        <button onclick="clearDisplay()" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">
          Clear
        </button>
      </div>

      <div id="loading" class="hidden text-center py-8">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
        <p class="mt-2 text-gray-600">Loading...</p>
      </div>

      <div id="error" class="hidden bg-red-50 border border-red-200 rounded p-4 mb-4">
        <h3 class="font-bold text-red-800">Error:</h3>
        <p id="errorMessage" class="text-red-600"></p>
      </div>

      <div id="results" class="space-y-4"></div>
    </div>
  </div>

  <script type="module">
    import { projectId, publicAnonKey } from './utils/supabase/info.js';
    
    window.projectId = projectId;
    window.publicAnonKey = publicAnonKey;

    async function makeRequest(endpoint) {
      const response = await fetch(
        `https://${projectId}.supabase.co/functions/v1/make-server-6d579fee${endpoint}`,
        {
          headers: {
            'Authorization': `Bearer ${publicAnonKey}`
          }
        }
      );
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${await response.text()}`);
      }
      
      return response.json();
    }

    window.loadAllUsers = async function() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const results = document.getElementById('results');
      
      loading.classList.remove('hidden');
      error.classList.add('hidden');
      results.innerHTML = '';
      
      try {
        const data = await makeRequest('/users');
        
        loading.classList.add('hidden');
        
        if (!data.users || data.users.length === 0) {
          results.innerHTML = '<p class="text-gray-500">No users found</p>';
          return;
        }

        results.innerHTML = `
          <h2 class="text-2xl font-bold mb-4">👥 All Users (${data.users.length})</h2>
          <div class="grid gap-4">
            ${data.users.map(user => `
              <div class="bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-lg p-4">
                <div class="flex justify-between items-start mb-2">
                  <div>
                    <h3 class="font-bold text-lg text-purple-900">${user.name || 'No Name'}</h3>
                    <p class="text-sm text-gray-600">${user.email}</p>
                  </div>
                  <div class="text-right">
                    <p class="text-xs text-gray-500">User ID:</p>
                    <code class="text-xs bg-white px-2 py-1 rounded">${user.id?.substring(0, 20)}...</code>
                  </div>
                </div>
                
                ${user.inviteCode ? `
                  <div class="mt-3 bg-blue-50 border border-blue-200 rounded p-3">
                    <p class="text-xs text-gray-600 mb-1">Invite Code:</p>
                    <code class="font-mono font-bold text-blue-900 text-lg tracking-wider">${user.inviteCode}</code>
                  </div>
                ` : '<p class="text-sm text-amber-600 mt-2">⚠️ No invite code generated</p>'}
                
                ${user.partnerId ? `
                  <div class="mt-2 flex items-center gap-2 text-green-700">
                    <span class="text-sm">💑 Partner ID:</span>
                    <code class="text-xs">${user.partnerId.substring(0, 20)}...</code>
                  </div>
                ` : '<p class="text-sm text-gray-500 mt-2">No partner linked</p>'}
                
                ${user.partnerEmail ? `
                  <p class="text-sm text-green-700 mt-1">Partner Email: ${user.partnerEmail}</p>
                ` : ''}
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        loading.classList.add('hidden');
        error.classList.remove('hidden');
        document.getElementById('errorMessage').textContent = err.message;
      }
    };

    window.loadAllInviteCodes = async function() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const results = document.getElementById('results');
      
      loading.classList.remove('hidden');
      error.classList.add('hidden');
      results.innerHTML = '';
      
      try {
        const data = await makeRequest('/invite-codes');
        
        loading.classList.add('hidden');
        
        if (!data.codes || data.codes.length === 0) {
          results.innerHTML = '<p class="text-gray-500">No invite codes found</p>';
          return;
        }

        results.innerHTML = `
          <h2 class="text-2xl font-bold mb-4">🔑 All Invite Codes (${data.codes.length})</h2>
          <div class="grid gap-3">
            ${data.codes.map(code => `
              <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded p-3">
                <div class="flex justify-between items-center">
                  <div>
                    <code class="font-mono font-bold text-lg text-blue-900">${code.code}</code>
                    <p class="text-sm text-gray-600 mt-1">${code.name} (${code.email})</p>
                  </div>
                  <div class="text-xs text-gray-500">
                    <p>User ID:</p>
                    <code class="bg-white px-2 py-1 rounded">${code.userId.substring(0, 15)}...</code>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        loading.classList.add('hidden');
        error.classList.remove('hidden');
        document.getElementById('errorMessage').textContent = err.message;
      }
    };

    window.loadAllJournals = async function() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const results = document.getElementById('results');
      
      loading.classList.remove('hidden');
      error.classList.add('hidden');
      results.innerHTML = '';
      
      try {
        // This would need a special endpoint - for now show message
        loading.classList.add('hidden');
        results.innerHTML = '<p class="text-gray-500">Journal viewer not yet implemented</p>';
      } catch (err) {
        loading.classList.add('hidden');
        error.classList.remove('hidden');
        document.getElementById('errorMessage').textContent = err.message;
      }
    };

    window.clearDisplay = function() {
      document.getElementById('results').innerHTML = '';
      document.getElementById('error').classList.add('hidden');
    };

    // Auto-load users on page load
    window.addEventListener('load', () => {
      loadAllUsers();
    });
  </script>
</body>
</html>
